services:
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: skye-uptime-kuma
    restart: unless-stopped
    ports:
      - "127.0.0.1:${UPTIME_KUMA_PORT:-3002}:3001"
    volumes:
      - ./uptime-kuma:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro

  alloy:
    image: grafana/alloy:v1.12.0
    container_name: skye-grafana-alloy
    restart: unless-stopped
    profiles: [grafana]
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=127.0.0.1:12345
    environment:
      GRAFANA_LOKI_URL: ${GRAFANA_LOKI_URL:-}
      GRAFANA_LOKI_USER: ${GRAFANA_LOKI_USER:-}
      GRAFANA_LOKI_TOKEN: ${GRAFANA_LOKI_TOKEN:-}
      GRAFANA_PROMETHEUS_URL: ${GRAFANA_PROMETHEUS_URL:-}
      GRAFANA_PROMETHEUS_USER: ${GRAFANA_PROMETHEUS_USER:-}
      GRAFANA_PROMETHEUS_TOKEN: ${GRAFANA_PROMETHEUS_TOKEN:-}
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "127.0.0.1:12345:12345"
